  </div>`,
  setup() {
    const activeCat = ref('All');
    const cats = ['All','Youth','Agriculture','Culture','Education','Community'];
    
    // Default stories
    const defaultStories = [
      { tag:'Education',   tagColor:'#185FA5', emoji:'', bg:'#0A1525', title:'Cuttington\'s Legacy: 135 Years of Learning in Bong County',     preview:'How the oldest private university in Sub-Saharan Africa has shaped thousands of Liberian leaders since 1889.',         author:'Community Voices', role:'Suakoko, Bong County', isPublished: true, fullStory:'Founded in 1889, Cuttington University stands as a beacon of educational excellence in Liberia and across Sub-Saharan Africa. For 135 years, nestled in the quiet town of Suakoko in Bong County, this institution has nurtured generations of leaders, scholars, and changemakers who have gone on to shape not just Liberia, but the broader West African region.\n\nFrom its humble beginnings as a missionary school to its current status as a co-educational university offering degrees in agriculture, business, education, engineering, and the sciences, Cuttington has remained steadfast in its mission: to educate young minds and develop leaders of character and competence.\n\nThe university has produced senators, government officials, business leaders, healthcare professionals, and educators. What makes Cuttington special is not just its academic rigor, but its commitment to community. Students engage in service learning projects across Bong County, working with farmers, health centers, and local schools. The Agricultural Research and Innovation Center (CARI) at Cuttington has revolutionized farming practices across the county, introducing new crop varieties and sustainable techniques that have boosted productivity and food security.\n\nToday, as Cuttington celebrates over a century of service, it remains a source of pride for Bong County—a living testament to the transformative power of education and the vision of those who believed that quality learning could flourish in rural Liberia.' },
      { tag:'Agriculture', tagColor:'#1B5E35', emoji:'', bg:'#0D2E12', title:'The Farmer Who Brought Irrigation to His Village in Zota',        preview:'How one determined farmer transformed food security for 200 families using techniques from TAVTC training.',          author:'Emmanuel Kollie',  role:'Zota District Farmer', isPublished: true, fullStory:'Emmanuel Kollie was born in Zota District, where farming was a way of life but also a constant struggle against the seasons. For generations, farmers in his village relied entirely on rainfall, which meant crop failures were common. When the rains came late or the dry season stretched longer than expected, families went hungry.\n\nIn 2019, Emmanuel attended a six-month training program at the Tumutu Agricultural Vocational Training Center (TAVTC) in Salala. There, he learned about drip irrigation—a technique that could transform agriculture in his region. Armed with new knowledge and determination, he returned to his village with a vision: to build an irrigation system that would allow farmers to grow year-round.\n\nWith his own savings and a small loan from a community microfinance group, Emmanuel began constructing a simple drip irrigation system using locally available materials. He started with just half an acre, growing vegetables during the dry season. The results were remarkable—his yields tripled, and he earned enough income to expand the system to a full acre.\n\nWord spread quickly through the village. Other farmers, seeing Emmanuel\'s success, asked for help. Over the next three years, Emmanuel trained 47 farmers in his village in irrigation techniques. Today, 200 families in his community—directly or indirectly—benefit from the irrigation systems that Emmanuel pioneered. The village that once faced food insecurity now produces a surplus, selling vegetables to markets in Gbarnga.\n\nEmmanuel\'s story is a powerful reminder that one person\'s determination and willingness to learn can transform an entire community. He continues to train young farmers and is now working with TAVTC to expand irrigation initiatives across Zota District.' },
      { tag:'Youth',       tagColor:'#C8960C', emoji:'', bg:'#2C1500', title:'Growing Up Near Bong Mines: Between History and Opportunity',     preview:'Young people in Bong Town reflect on growing up beside one of Liberia\'s most iconic industrial landmarks.',           author:'Daniel Sumo',      role:'Bong Town', isPublished: true, fullStory:'The Bong Mining Area, including the iconic Blue Lake—a former German iron ore mine now filled with crystalline water—is more than just a historical landmark. For young people like Daniel Sumo, it\'s the backdrop of their childhood, a symbol of both Bong County\'s industrial past and its uncertain future.\n\n"I grew up in the shadow of these mines," Daniel recalls. "As a child, I didn\'t fully understand the history, but I knew this place was important. It represented something grand—a time when Bong County was a powerhouse of West African industry."\n\nThe Bong Mining Company operated from the 1960s through the 1990s, extracting iron ore and shaping the economic and physical landscape of the region. At its peak, it employed thousands of workers and generated significant revenue for Liberia. But as the mines closed and economic conditions changed, the area faced challenges—unemployment, aging infrastructure, and a sense of lost opportunity.\n\nYet for young people like Daniel, growing up near Bong Mines has also sparked ambition. "We see what was built here. We ask ourselves: what can we build? What opportunities can we create?" Many youth have been inspired to pursue careers in engineering, geology, business management, and environmental science.\n\nToday, young people in Bong Town are exploring how to revitalize their region. Some are studying renewable energy, imagining how solar and hydroelectric projects could power the county\'s future. Others are starting tourism initiatives around the Blue Lake, sharing the story of Bong County\'s mining heritage with visitors. The mines may no longer extract ore, but they continue to extract something more valuable from young people: inspiration, determination, and a vision for renewal.\n\n"History isn\'t just what happened in the past," Daniel says. "It\'s also a foundation for what we can build tomorrow."' },
      { tag:'Culture',     tagColor:'#5A7260', emoji:'', bg:'#1A0D00', title:'The Traditional Leaders Who Keep Bong County\'s Soul Alive',      preview:'From Paramount Chief Mary Larteh to village elders — how traditional leadership shapes modern Bong County.',          author:'Community Story',  role:'Jorquelleh Chiefdom', isPublished: true, fullStory:'In a rapidly modernizing world, traditional leaders in Bong County remain the backbone of community cohesion, conflict resolution, and cultural preservation. They are custodians of history, advocates for justice, and bridges between past and future.\n\nParamount Chief Mary Larteh of the Jorquelleh Chiefdom is one such leader. For decades, she has served her people with wisdom, compassion, and an unwavering commitment to justice. She settles land disputes with fairness, counsels families through conflicts, and ensures that traditional customs are honored while embracing positive change.\n\n"A paramount chief is not just a title," Chief Larteh explains. "It is a responsibility to the land, to the ancestors, and to the generations that will come after us. We must preserve our culture while our people benefit from progress."\n\nTraditional leaders like Chief Larteh work closely with county administrators, health workers, and educators. When the county launched a health education campaign about malaria prevention, it was traditional leaders who helped explain the importance of bed nets to their people. When schools needed community support, it was the chiefs who mobilized resources and encouraged parents to send their children to class.\n\nBeyond governance, traditional leaders are keepers of history. They recount stories of the Kpelle, Loma, and Mandingo peoples who have inhabited Bong County for centuries. Through their narratives, youth learn about ancestral wisdom, values of community, and the struggles and triumphs that shaped their identity.\n\nIn 2025, Chief Arthur Goah was elected as the new Chairperson of the National Chiefs and Elders Council—a testament to the respect and significance accorded to Bong County\'s traditional leadership. Meanwhile, village elders in communities across the county continue their quiet, essential work: teaching young people respect for the land, mediating disputes, and ensuring that Bong County\'s cultural soul remains vibrant even as it moves forward.' },
      { tag:'Community',   tagColor:'#1B5E35', emoji:'', bg:'#0D1A10', title:'Life in Sugar Hill: Community, Resilience & Progress in Gbarnga', preview:'A portrait of one of Gbarnga\'s most vibrant communities — from market women to youth leaders.',                      author:'Agnes Kollie',     role:'Sugar Hill, Gbarnga', isPublished: true, fullStory:'Sugar Hill is more than just a neighborhood in Gbarnga—it\'s a living embodiment of Bong County\'s spirit: resilient, vibrant, and full of hope. Agnes Kollie, who has lived in Sugar Hill for 20 years, paints a vivid picture of community life.\n\n"Every morning, the market women are up before dawn. They prepare their goods, arrange their stalls, and by 6 AM, Sugar Hill comes alive," Agnes describes. These women—traders, farmers, mothers—are the economic heartbeat of the community. They sell vegetables, rice, palm oil, textiles, and countless other goods. Many of them send their children to school through the income they earn.\n\nBut Sugar Hill is not just about commerce. It\'s about connection. Community members gather for naming ceremonies, weddings, and funerals. When a house burns down, neighbors help rebuild. When a child is sick, the community contributes to medical care. When a young person gets accepted to university, the celebration is shared by everyone.\n\nIn recent years, Sugar Hill has seen youth-led initiatives flourish. A group of young entrepreneurs started a community learning center where children receive after-school tutoring. A women\'s savings group has grown to 45 members, providing microfinance and economic support. Youth have organized community cleanup drives and sports tournaments that bring neighbors together.\n\n"What strikes me most about Sugar Hill is that despite challenges—poverty, limited infrastructure, limited job opportunities—people have not lost their hope or their sense of community," Agnes reflects. "We celebrate small victories. We support each other. We believe that together, we can build something better."\n\nSugar Hill represents thousands of communities across Bong County where ordinary people do extraordinary things—where resilience and unity are not just ideals but daily practices.' },
      { tag:'Youth',       tagColor:'#C8960C', emoji:'', bg:'#251200', title:'Learning to Code at BCTC: Bong County\'s Tech Generation',        preview:'Students at Bong County Technical College are writing software that could serve their communities — and the world.',   author:'Junior Morris',    role:'BCTC Student, Gbarnga', isPublished: true, fullStory:'In a computer lab at Bong County Technical College (BCTC) in Gbarnga, a group of young people are typing lines of code, debugging programs, and building applications. They are part of a new generation of tech entrepreneurs and developers who are proving that cutting-edge technology is not exclusive to Silicon Valley or Lagos—it belongs right here in Bong County.\n\nJunior Morris, a third-year student in BCTC\'s Information Technology program, discovered his passion for coding almost by accident. "I came to BCTC thinking I\'d study general IT, but when I took my first programming course, something clicked. I realized I could create solutions to real problems."\n\nWith guidance from his instructors and collaboration with peers, Junior led a team to develop a mobile app that helps farmers in Bong County access market prices for their produce in real-time. The app was born from frustration: farmers often didn\'t know the fair market value of their crops, leading to exploitation by middlemen. The app, called "Market Voice," has been downloaded over 500 times and is helping farmers make better economic decisions.\n\nJunior\'s story is not unique at BCTC. Across the college, students are working on projects addressing real challenges: an app to help health centers manage patient records, a software system for schools to track student performance, a platform connecting youth to job opportunities in Bong County.\n\n"What\'s exciting is that we\'re not just learning theory," Junior explains. "We\'re applying our learning to solve problems in our own communities. We\'re creating technology that reflects our context and our values."\n\nThe college has partnered with tech organizations and international mentors to provide students with world-class training. Students have access to modern equipment, coding bootcamps, and internship opportunities. Some graduates have started their own tech companies; others have moved to positions with international organizations; all are contributing to Africa\'s digital transformation.\n\nAs Junior looks to the future, his ambition is clear: "I want to show young people in Bong County that technology is for us too. That we can be innovators, not just consumers. That our ideas matter."' },
    ];
    
    // Load submitted stories from localStorage
    const loadSubmittedStories = () => {
      try {
        const saved = localStorage.getItem('bongCountySubmittedStories');
        return saved ? JSON.parse(saved) : [];
      } catch (e) {
        return [];
      }
    };
    
    // Initialize stories array with defaults + submitted stories
    const stories = ref([...defaultStories, ...loadSubmittedStories()]);
    const filtered = computed(() => activeCat.value === 'All' ? stories.value : stories.value.filter(s => s.tag === activeCat.value));
    
    const showStoryModal = ref(false);
    const submitSuccess = ref(false);
    const storyForm = reactive({
      name: '',
      role: '',
      category: '',
      title: '',
      story: '',
      email: ''
    });
    
    const submitStory = () => {
      if (!storyForm.name || !storyForm.email || !storyForm.story || !storyForm.title || !storyForm.category) {
        alert('Please fill in all required fields');
        return;
      }
      if (storyForm.story.length < 100) {
        alert('Please write at least 100 characters for your story');
        return;
      }
      
      // Create new story object
      const categoryColors = {
        'Youth': { color: '#C8960C', bg: '#251200' },
        'Agriculture': { color: '#1B5E35', bg: '#0D2E12' },
        'Culture': { color: '#5A7260', bg: '#1A0D00' },
        'Education': { color: '#185FA5', bg: '#0A1525' },
        'Community': { color: '#1B5E35', bg: '#0D1A10' },
        'Other': { color: '#555555', bg: '#1A1A1A' }
      };
      const colors = categoryColors[storyForm.category] || categoryColors['Other'];
      
      const newStory = {
        tag: storyForm.category,
        tagColor: colors.color,
        emoji: '',
        bg: colors.bg,
        title: storyForm.title,
        preview: storyForm.story.substring(0, 150) + (storyForm.story.length > 150 ? '...' : ''),
        author: storyForm.name,
        role: storyForm.role,
        isPublished: false,
        submittedAt: new Date().toLocaleDateString(),
        fullStory: storyForm.story
      };
      
      // Add to stories array
      stories.value.unshift(newStory);
      
      // Save to localStorage
      try {
        const submitted = loadSubmittedStories();
        submitted.unshift(newStory);
        localStorage.setItem('bongCountySubmittedStories', JSON.stringify(submitted));
      } catch (e) {
        console.log('Could not save to localStorage');
      }
      
      // Send email notification
      const mailtoBody = `Name: ${storyForm.name}%0ARole/Location: ${storyForm.role}%0ACategory: ${storyForm.category}%0ASubmitter Email: ${storyForm.email}%0A%0AStory Title: ${storyForm.title}%0A%0AStory:%0A${storyForm.story}%0A%0A----%0AThis story has been automatically published on the website at bongcounty.lr/stories`;
      window.open(`mailto:sumobequizzy@gmail.com?subject=New Story Submitted: ${encodeURIComponent(storyForm.title)}&body=${mailtoBody}`);
      
      // Show success message
      submitSuccess.value = true;
      setTimeout(() => {
        submitSuccess.value = false;
        showStoryModal.value = false;
      }, 3000);
      
      // Reset form
      storyForm.name = '';
      storyForm.role = '';
      storyForm.category = '';
      storyForm.title = '';
      storyForm.story = '';
      storyForm.email = '';
    };
    
    return { activeCat, cats, filtered, selectedStory: ref(null), showStoryModal, submitSuccess, storyForm, submitStory };
  }
};

};

/* ══════════════════════════════════════
   ROUTER + APP SHELL
══════════════════════════════════════ */
const router = createRouter({
  history: typeof location !== 'undefined' && location.protocol === 'file:' 
    ? VueRouter.createMemoryHistory() 
    : VueRouter.createWebHashHistory(),
  routes: [
    { path:'/',              component:PageHome },
    { path:'/about',         component:PageAbout },
    { path:'/tourism',       component:PageTourism },
    { path:'/leadership',    component:PageLeadership },
    { path:'/education',     component:PageEducation },
    { path:'/opportunities', component:PageOpportunities },
    { path:'/stories',       component:PageStories },
    { path:'/community',     component:PageCommunity },
  ],
  scrollBehavior() { return { top:0 }; }
});

// ══ INITIALIZE COUNTY PAGE PROTECTION ══
(async () => {
  console.log('🔐 Setting up County Page Access Protection...');
  
  const protection = new CountyPageProtection(window.supabaseClient);
  await protection.initialize();
  protection.setupRouterGuard(router);
  
  console.log('✓ Protection system ready');
})();

createApp({
  setup() {
    console.log('App setup starting...');
    const mob = ref(false);
    const showAuthMenu = ref(false);
    const authUser = ref(null);

    // Check if user is logged in on mount
    const checkAuth = async () => {
      try {
        const user = await window.supabaseHelpers?.getCurrentUser?.();
        authUser.value = user;
      } catch (error) {
        console.log('Auth check skipped (offline mode):', error);
      }
    };

    // Sign out
    const doSignOut = async () => {
      try {
        const result = await window.supabaseHelpers?.signOut?.() || { success: false };
        if (result.success) {
          authUser.value = null;
          window.location.href = '../auth-page/auth.html';
        }
      } catch (error) {
        console.error('Sign out error:', error);
      }
    };

    // Listen for auth changes
    try {
      window.supabaseHelpers?.onAuthStateChange?.(({ user }) => {
        authUser.value = user;
      });
    } catch (error) {
      console.log('Auth state listener skipped');
    }

    checkAuth();

    const nav = [
      { to:'index.html',     label:'← Back to Explore Liberia', external: true },
      { to:'/about',         label:'About' },
      { to:'/tourism',       label:'Tourism' },
      { to:'/leadership',    label:'Leadership' },
      { to:'/education',     label:'Education' },
      { to:'/opportunities', label:'Opportunities' },
      { to:'/stories',       label:'Stories' },
      { to:'/community',     label:'Community' },
    ];
    const footerCols = [
      { title:'Explore',   links:[{ to:'/tourism', label:'Tourist Sites' }, { to:'/about', label:'Districts & Towns' }, { to:'/leadership', label:'Leadership' }, { to:'/stories', label:'Stories' }] },
      { title:'Resources', links:[{ to:'/education', label:'Universities' }, { to:'/education', label:'High Schools' }, { to:'/education', label:'Healthcare' }, { to:'/opportunities', label:'Scholarships' }] },
      { title:'Community', links:[{ to:'/community', label:'Announcements' }, { to:'/community', label:'Events' }, { to:'/youth', label:'Youth Hub' }, { to:'/stories', label:'Voices' }] },
    ];
    return { mob, nav, footerCols, showAuthMenu, authUser, doSignOut };
  }
}).use(router).mount('#app');

// Error handling
if (!document.querySelector('#app')) {
  console.error('Mount element #app not found');
}
console.log('Bong County website loaded successfully');
</script>
</body>
</html>
</script>
</body>
