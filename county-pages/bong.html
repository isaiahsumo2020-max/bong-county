<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>www.bongcounty</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <!-- CDN Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- AUTHENTICATION & PROTECTION -->
  <script src="../../supabaseClient.js"></script>
  <script src="js/county-page-protection.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: { DEFAULT: '#C2410C', light: '#EA580C', pale: '#FEE2CC', dark: '#1a1a1a' },
            gold: { DEFAULT: '#000000', light: '#333333', pale: '#F5F5F5' },
            ink: { DEFAULT: '#1A1A1A', muted: '#555555', border: '#E5E5E5' }
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F9FBF9;
    }

    .page-enter-active,
    .page-leave-active {
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .page-enter-from {
      opacity: 0;
      transform: translateY(10px);
    }

    .page-leave-to {
      opacity: 0;
      transform: translateY(-6px);
    }

    a {
      text-decoration: none;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #C2410C;
      border-radius: 4px;
    }

    .nav-active {
      color: #EA580C !important;
      background: rgba(255, 255, 255, 0.1) !important;
    }

    button {
      font-family: 'DM Sans', sans-serif;
    }

    details summary {
      list-style: none;
      cursor: pointer;
    }

    details summary::-webkit-details-marker {
      display: none;
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- ═══ NAV ═══ -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-forest-dark border-b-2 border-forest" style="height:68px">
      <div class="max-w-6xl mx-auto h-full flex items-center justify-between px-6">
        <router-link to="/" class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-full bg-forest flex items-center justify-center font-display font-black text-white text-sm flex-shrink-0">
            BC</div>
          <div>
            <div class="font-display text-white font-bold text-base leading-tight">Bong County</div>
            <div class="text-forest-light text-xs tracking-widest uppercase font-body font-light"
              style="font-size:0.6rem">Toure · Bong County</div>
          </div>
        </router-link>
        <div class="hidden md:flex items-center gap-0.5">
          <template v-for="l in nav" :key="l.to">
            <a v-if="l.external" :href="l.to"
              class="text-white/70 hover:text-white hover:bg-white/10 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200">{{
              l.label }}</a>
            <router-link v-else :to="l.to"
              class="text-white/70 hover:text-white hover:bg-white/10 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200"
              active-class="nav-active">{{ l.label }}</router-link>
          </template>
        </div>

        <!-- Auth Section -->
        <div class="hidden md:flex items-center gap-2">
          <template v-if="authUser">
            <button @click="showAuthMenu = !showAuthMenu"
              class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors">
              <div
                class="w-6 h-6 rounded-full bg-forest-light flex items-center justify-center text-white text-xs font-bold">
                {{ authUser.email?.charAt(0).toUpperCase() }}</div>
              <span class="text-white text-sm font-medium">{{ authUser.email }}</span>
            </button>
            <div v-if="showAuthMenu"
              class="absolute top-16 right-6 bg-forest rounded-lg shadow-lg border border-white/10 w-40 z-50">
              <a href="../dashboard-page/dashboard.html"
                class="block w-full text-left px-4 py-2 text-white hover:bg-white/10 transition-colors text-sm border-b border-white/10">
                <i class="fa-dashboard"></i>
                Dashboard
              </a>
              <button @click="doSignOut(); showAuthMenu = false"
                class="w-full text-left px-4 py-2 text-white hover:bg-white/10 transition-colors text-sm">Sign
                Out</button>
            </div>
          </template>
          <template v-else>
            <a href="../auth-page/auth.html"
              class="px-4 py-1.5 bg-forest-light text-white rounded-lg text-sm font-medium hover:bg-forest transition-colors inline-block">Login</a>
          </template>
        </div>

        <button class="md:hidden text-white text-2xl bg-transparent border-0 cursor-pointer leading-none"
          @click="mob=true">☰</button>
      </div>
    </nav>

    <!-- ═══ MOBILE DRAWER ═══ -->
    <transition name="page">
      <div v-if="mob" class="fixed inset-0 z-50 bg-forest-dark flex flex-col px-8 pt-20 pb-8">
        <button class="absolute top-5 right-6 text-white text-2xl bg-transparent border-0 cursor-pointer leading-none"
          @click="mob=false">✕</button>
        <template v-for="l in nav" :key="l.to">
          <a v-if="l.external" :href="l.to" @click="mob=false"
            class="font-display text-2xl text-white/80 hover:text-forest-light py-4 border-b border-white/10 transition-colors block">{{
            l.label }}</a>
          <router-link v-else :to="l.to"
            class="font-display text-2xl text-white/80 hover:text-forest-light py-4 border-b border-white/10 transition-colors"
            @click="mob=false">{{ l.label }}</router-link>
        </template>
        <!-- MOBILE AUTH SECTION -->
        <div class="mt-8 pt-6 border-t border-white/10">
          <template v-if="authUser">

            <!-- User Info -->
            <!-- <div class="flex items-center gap-3 mb-5">
      <div class="w-10 h-10 rounded-full bg-forest-light flex items-center justify-center text-white font-bold">
        {{ authUser.email?.charAt(0).toUpperCase() }}
      </div>

      <div class="min-w-0">
        <div class="text-white font-medium truncate">
          {{ authUser.email }}
        </div>

        <div class="text-forest-light text-sm">
          Logged In
        </div>
      </div>
    </div> -->

            <!-- Dashboard Button -->
            <!-- <a
      href="../dashboard-page/dashboard.html"
      @click="mob=false"
      class="flex items-center gap-3 w-full px-4 py-3 rounded-xl bg-forest text-white mb-3 hover:bg-forest-light transition-colors"
    >
      <i class="fa-solid fa-table-columns"></i>
      <span>Dashboard</span>
    </a> -->

            <div class="flex items-center gap-3">
              <!-- Profile Button -->
              <a href="../profile-page/profile.html" @click="mob=false"
                class="flex items-center gap-3 w-20 h-10 px-6 py-3 rounded-xl bg-blue-800 text-white mb-3 hover:bg-blue-700 transition-colors">
                <i class="fa-solid fa-user align-center"></i>
              </a>

              <!-- Logout -->
              <button @click="doSignOut(); mob=false"
                class="flex items-center gap-3 w-35 h-16 ml-4 py-3 rounded-xl bg-red-700 text-white hover:bg-red-500/30 transition-colors">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Sign Out</span>
              </button>
            </div>
          </template>

          <!-- Not Logged In -->
          <template v-else>

            <a href="../auth-page/auth.html" @click="mob=false"
              class="block w-full text-center px-4 py-3 rounded-xl bg-forest-light text-white font-medium hover:bg-forest transition-colors">
              Login / Create Account
            </a>

          </template>
        </div>
      </div>
    </transition>

    <!-- ═══ PAGE CONTENT ═══ -->
    <div style="padding-top:68px; min-height:calc(100vh - 68px)">
      <router-view v-slot="{ Component }">
        <transition name="page" mode="out-in">
          <component :is="Component" />
        </transition>
      </router-view>
    </div>

    <!-- ═══ FOOTER ═══ -->
    <footer class="bg-forest-dark pt-12 pb-6 px-6">
      <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-10 pb-10 border-b border-white/10 mb-6">
          <div class="col-span-2 md:col-span-1">
            <div class="flex items-center gap-3 mb-3">
              <div
                class="w-9 h-9 rounded-full bg-forest flex items-center justify-center font-display font-black text-white text-xs">
                BC</div>
              <div class="font-display text-white font-bold leading-tight">Bong County</div>
            </div>
            <p class="text-white/40 text-sm leading-relaxed max-w-xs">The Heartbeat of Liberia, connecting citizens,
              showcasing heritage, and powering development.</p>
          </div>
          <div v-for="col in footerCols" :key="col.title">
            <h5 class="text-forest-light text-xs font-semibold tracking-widest uppercase mb-4">{{ col.title }}</h5>
            <router-link v-for="l in col.links" :key="l.label" :to="l.to"
              class="block text-white/45 hover:text-white text-sm mb-2 transition-colors">{{ l.label }}</router-link>
          </div>
        </div>
        <div class="flex flex-col md:flex-row justify-between items-center gap-2">
          <p class="text-white/25 text-xs">© 2025 Bong County Digital Platform · Built for the people of Bong County,
            Liberia.</p>
          <p class="text-white/20 text-xs tracking-widest">UNITY · HERITAGE · PROGRESS</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="../supabaseClient.js"></script>
  <script src="bong.js"></script>
</body>

</html>
